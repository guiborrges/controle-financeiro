<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Controle Financeiro - logo redonda</title>
  <desc id="desc">Marca circular minimalista em azul e verde para aplicativo de controle financeiro pessoal.</desc>
  <defs>
    <linearGradient id="bg" x1="96" y1="64" x2="416" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1F5D8F"/>
      <stop offset="0.55" stop-color="#2471A3"/>
      <stop offset="1" stop-color="#2FAE85"/>
    </linearGradient>
    <linearGradient id="accent" x1="178" y1="322" x2="346" y2="186" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2FAE85"/>
      <stop offset="1" stop-color="#7EE2BF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0B2A3E" flood-opacity="0.18"/>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="236" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="190" fill="#FAFAF8" opacity="0.12"/>

  <g filter="url(#softShadow)">
    <path d="M356 151a144 144 0 1 0 0 210" fill="none" stroke="#FAFAF8" stroke-width="48" stroke-linecap="round"/>
    <path d="M181 300l50-50 45 39 70-82" fill="none" stroke="url(#accent)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="347" cy="207" r="22" fill="#FAFAF8"/>
    <circle cx="347" cy="207" r="12" fill="#2FAE85"/>
  </g>
</svg>
