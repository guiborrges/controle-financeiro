name: Deploy para Oracle Cloud

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v3

      - name: Instalar dependencias
        run: npm ci

      - name: Validar vulnerabilidades de dependencias
        run: npm audit --audit-level=critical

      - name: Enviar arquivos via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_KEY }}
          source: "."
          target: "/home/ubuntu/controle-financeiro"

      - name: Reiniciar o servidor
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_KEY }}
          script: |
            cd /home/ubuntu/controle-financeiro
            npm install --omit=dev
            pm2 restart all || node server.js &
