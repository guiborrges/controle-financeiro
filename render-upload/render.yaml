services:
  - type: web
    name: controle-financeiro
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: FIN_STORAGE_DIR
        value: /var/data/controle-financeiro
      - key: FIN_SESSION_SECRET
        generateValue: true
    disks:
      - name: controle-financeiro-data
        mountPath: /var/data
        sizeGB: 1
